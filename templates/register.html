{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="card login-card">
    <h2 class="card-title">用户注册</h2>
    <p class="card-subtitle">创建一个新账号</p>

    {% if error %}
        <div class="error-msg" role="alert" aria-live="assertive">
            <span class="error-icon" aria-hidden="true">⚠️</span>
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}" class="login-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label for="username" class="form-label">用户名</label>
            <input
                type="text"
                id="username"
                name="username"
                class="form-input"
                placeholder="请输入用户名"
                required
                maxlength="50"
                autocomplete="username"
                autofocus
            >
        </div>

        <div class="form-group">
            <label for="password" class="form-label">密码</label>
            <input
                type="password"
                id="password"
                name="password"
                class="form-input"
                placeholder="请输入密码"
                required
                minlength="6"
                maxlength="128"
                autocomplete="new-password"
            >
        </div>

        <div class="form-group">
            <label for="email" class="form-label">邮箱</label>
            <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="请输入邮箱地址"
                maxlength="100"
            >
        </div>

        <div class="form-group">
            <label for="phone" class="form-label">手机号</label>
            <input
                type="text"
                id="phone"
                name="phone"
                class="form-input"
                placeholder="请输入手机号码"
                maxlength="20"
            >
        </div>

        <button type="submit" class="btn btn-primary btn-block">注册</button>
    </form>

    <p class="form-footer">
        已有账号？<a href="{{ url_for('login') }}">去登录</a>
    </p>
</div>
{% endblock %}

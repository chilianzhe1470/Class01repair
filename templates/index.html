{% extends "base.html" %}
{% block content %}
{% if user %}
    <div class="card">
        <h2>欢迎回来，{{ user.username }}！</h2>
        <div class="user-info">
            <ul class="info-list">
                <li><span class="info-label">用户名：</span>{{ user.username }}</li>
                <li><span class="info-label">邮箱：</span>{{ user.email }}</li>
                <li><span class="info-label">手机：</span>{{ user.phone }}</li>
                <li><span class="info-label">角色：</span>{{ user.role }}</li>
                <li><span class="info-label">余额：</span>{{ user.balance }}</li>
            </ul>
        </div>
        <a href="{{ url_for('logout') }}" class="btn btn-danger">退出登录</a>
    </div>
{% else %}
    <div class="card">
        <h2>请先登录</h2>
        <p>您尚未登录，请点击下方按钮登录系统。</p>
        <a href="{{ url_for('login') }}" class="btn btn-primary">前往登录</a>
    </div>
{% endif %}
{% endblock %}
